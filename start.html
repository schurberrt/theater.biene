<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Workshops</title>
    <style>
                h1 {
            color: darkred;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #797ab0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content-box {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 1400px;
            margin: 20px auto;
        }
        .workshops-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 40px auto 20px auto;
        }

        .workshop-column {
            flex: 1;
            min-width: 250px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        .workshop-header {
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .info-box-main {
            background-color: #00008B;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            color: white;
            text-decoration: none;
            min-height: 150px;
            display: block;
            transition: background-color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
        }

        .info-box-main:hover {
            background-color: #0000cd;
        }

        /* Gemeinsame Button-Zeile ganz unten */
        .bottom-button-row {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
            width: 100%;
        }

        .btn-grey {
            padding: 15px 30px;
            background-color: #8da399;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 4px;
            transition: 0.3s;
            font-size: 16px;
            min-width: 150px;
        }

        .btn-grey:hover {
            background-color: #6d7f76;
        }
            footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: white;
        }

        footer a {
            color: white;
            text-decoration: underline;
        }
        @media (max-width: 790px) {
        .workshops-wrapper {
            flex-direction: column;
            align-items: center;
        }
        .workshop-column {
            width: 120%;
            max-width: none;
        }
        .bottom-button-row {
            flex-direction: column;
            align-items: center;
        }
    }
    </style>
</head>
<body>
    <h1>Willkommen bei meinen Theaterkursen 🎭</h1>
    <div class="main-content-box">
        <div class="workshops-wrapper">
            <div class="workshop-column">
                <a href="theatergetöse.html" class="info-box-main">TheaterGetöse</a>
            </div>
            <div class="workshop-column">
                <a href="improtheater.html" class="info-box-main">Improtheater</a>
            </div>
            <div class="workshop-column">
                <a href="clownsgedönse.html" class="info-box-main">ClownsGedönse</a>
            </div>
            <div class="workshop-column">
                <a href="kindertheater.html" class="info-box-main">Kindertheater</a>
            </div>
        </div>

        <!-- Nur zwei graue Buttons darunter -->
        <div class="bottom-button-row">
            <a href="allgemeine-details.html" class="btn-grey">Alle Details</a>
            <a href="kontakt.html" class="btn-grey">Jetzt Kontaktieren</a>
        </div>
    </div>
    <footer>
    <p>&copy; 2024 Dein Name | <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a></p>
    </footer>

</body>
</html>
